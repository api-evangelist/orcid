naftiko: 1.0.0-alpha2
info:
  label: ORCID Public API
  description: 'ORCID Public API. 16 operations. Lead operation: Get countries/regions associated with the record. Self-contained
    Naftiko capability covering one Orcid business surface.'
  tags:
  - Orcid
  - ORCID Public API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORCID_API_KEY: ORCID_API_KEY
capability:
  consumes:
  - type: http
    namespace: orcid
    baseUri: https://pub.orcid.org/v3.0
    description: ORCID Public API business capability. Self-contained, no shared references.
    resources:
    - name: orcid_id-address
      path: /{orcid_id}/address
      operations:
      - name: getaddress
        method: GET
        description: Get countries/regions associated with the record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-educations
      path: /{orcid_id}/educations
      operations:
      - name: geteducations
        method: GET
        description: Get education affiliations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-email
      path: /{orcid_id}/email
      operations:
      - name: getemail
        method: GET
        description: Get email addresses on the record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-employments
      path: /{orcid_id}/employments
      operations:
      - name: getemployments
        method: GET
        description: Get employment affiliations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-external-identifiers
      path: /{orcid_id}/external-identifiers
      operations:
      - name: getexternalidentifiers
        method: GET
        description: Get linked external identifiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-fundings
      path: /{orcid_id}/fundings
      operations:
      - name: getfundings
        method: GET
        description: Get funding activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-keywords
      path: /{orcid_id}/keywords
      operations:
      - name: getkeywords
        method: GET
        description: Get keywords associated with the record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-other-names
      path: /{orcid_id}/other-names
      operations:
      - name: getothernames
        method: GET
        description: Get alternative names on the record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-peer-reviews
      path: /{orcid_id}/peer-reviews
      operations:
