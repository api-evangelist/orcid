      - name: getperson
        method: GET
        description: Get the biographical (person) section of a record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-personal-details
      path: /{orcid_id}/personal-details
      operations:
      - name: getpersonaldetails
        method: GET
        description: Get name and biography
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-record
      path: /{orcid_id}/record
      operations:
      - name: getrecord
        method: GET
        description: Get full ORCID record summary
        outputRawFormat: json
        outputParameters:
