    - name: orcid_id-summary
      path: /{orcid_id}/summary
      operations:
      - name: getsummary
        method: GET
        description: Get a summary of validated and self-asserted record items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orcid_id-works
      path: /{orcid_id}/works
      operations:
